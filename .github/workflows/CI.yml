# This workflow will install Python dependencies, run tests, type-check, and lint.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Runs at 02:00 UTC every day. See https://crontab.guru for cron syntax.
    - cron: '0 2 * * *'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:


permissions:
  contents: read  # to fetch code
  actions: write  # to cancel previous workflows

# This prevents duplicate runs: when a PR exists, only the PR event runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  test_linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        jax-version: ["0.7.0", "0.8.0", "0.9.0", ""]

    steps:
      - uses: actions/checkout@v6
      - name: Print concurrency group
        run: echo '${{ github.workflow }}-${{ github.ref }}'
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip cache purge
          python -m pip install --upgrade pip build
          python -m pip install -r requirements-dev.txt
          if [ "${{ matrix.jax-version }}" == "" ]; then
            python -m pip install jax || exit 1
          else
            python -m pip install jax==${{ matrix.jax-version }} || exit 1
          fi
          python -m pip install . || exit 1
      - name: Test with pytest
        run: |
          # Use the coverage CLI rather than the pytest-cov plugin: the plugin's
          # tracer-start timing aborts (SIGABRT) under JAX/XLA, while `coverage
          # run` starts cleanly. Config lives in [tool.coverage.*] in pyproject.
          if [ "${{ github.event_name }}" == "schedule" ]; then
            coverage run -m pytest brainstate/ --run-slow
          else
            coverage run -m pytest brainstate/
          fi
          coverage report -m
          coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  type_check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache mypy
        uses: actions/cache@v6
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements-dev.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -r requirements-dev.txt
          pip install .
      - name: Type check with mypy
        run: |
          mypy brainstate/
      - name: Verify py.typed ships in the wheel
        run: |
          python -m build --wheel
          python - <<'PY'
          import glob, zipfile
          whl = sorted(glob.glob('dist/*.whl'))[-1]
          names = zipfile.ZipFile(whl).namelist()
          assert 'brainstate/py.typed' in names, f'py.typed NOT in wheel {whl}'
          print('OK: py.typed present in', whl)
          PY
